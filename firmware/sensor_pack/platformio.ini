; =============================================================================
; AyushBot Sensor Pack — PlatformIO Build Configuration
; =============================================================================
;
; PURPOSE:
;   This file configures the PlatformIO build system for the AyushBot Arduino-
;   based physiological sensor pack. It defines the target board (Arduino Nano
;   33 BLE Sense), the framework (Arduino), library dependencies, and build
;   flags required for compiling the firmware — including TensorFlow Lite Micro
;   for TinyML inference.
;
; KEY CONFIGURATION:
;   - Board:          Arduino Nano 33 BLE Sense (nRF52840, Cortex-M4F, 64 MHz)
;   - Framework:      Arduino
;   - Upload:         USB serial (auto-detected)
;   - Libraries:      TensorFlow Lite Micro, MAX30100 driver, OneWire (DS18B20),
;                     HX711 driver, ArduinoBLE
;   - Build Flags:    Enable INT8 quantization support, disable unused TFLite ops
;                     to minimise flash footprint (target < 4.2 KB for model)
;
; MONITOR:
;   Serial monitor at 115200 baud for debug output from main.cpp.
;
; NOTES:
;   - The Edge Impulse exported library (in ../edge_impulse/export/) can be
;     linked here as a lib_extra_dirs entry if using Edge Impulse instead of
;     raw TFLite Micro.
;   - Memory budget: 256 KB RAM, 1 MB Flash. The TinyML model must stay under
;     ~5 KB to leave room for sensor drivers, BLE stack, and Kalman filter.
; =============================================================================
