# =============================================================================
# AyushBot Infrastructure — Docker Compose (Development)
# =============================================================================
#
# PURPOSE:
#   Defines the multi-container Docker Compose setup for local development
#   and PHC gateway deployment. Orchestrates all backend services that run
#   on the Raspberry Pi 4 gateway.
#
# SERVICES DEFINED:
#
#   1. gateway (backend)
#      Build: ./backend/Dockerfile
#      Purpose: Main FastAPI application hosting the 5-agent system
#      Ports: 8000 (HTTP API)
#      Volumes:
#        - ./backend/rag/index:/app/rag/index (FAISS vector index)
#        - ./data/processed:/app/data (model artifacts)
#      Environment:
#        - LLM_MODEL_PATH: Path to Phi-3 Mini 4-bit GGUF
#        - FAISS_INDEX_PATH: Path to FAISS index
#        - MQTT_BROKER: Address of Mosquitto broker
#        - LOG_LEVEL: DEBUG (development) / WARNING (production)
#      Resources (RPi 4 limits):
#        - memory: 2 GB (leave 2 GB for OS + LLM inference)
#        - cpus: 3 (leave 1 core for system tasks)
#
#   2. mosquitto (MQTT broker)
#      Image: eclipse-mosquitto:2.x
#      Purpose: Receives BLE-bridged sensor data from Arduino via Android
#      Ports: 1883 (MQTT), 8883 (MQTTS with TLS)
#      Volumes:
#        - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
#        - ./infra/mosquitto/acl.conf:/mosquitto/config/acl.conf
#        - ./infra/certs:/mosquitto/certs (TLS certificates)
#      Security: TLS 1.3, client certificate authentication, ACL-based
#        topic authorization
#
#   3. redis (optional — session/cache store)
#      Image: redis:7-alpine
#      Purpose: Caches recent triage results, rate limiting state, and
#        LLM response cache (avoid re-running expensive LLM inference
#        for identical queries)
#      Ports: 6379
#      Memory limit: 256 MB (RPi 4 constraint)
#
# NETWORKS:
#   - ayushbot-net: Internal bridge network connecting all services
#     All inter-service communication stays on this private network
#
# VOLUMES:
#   - rag-index: Persistent volume for the FAISS vector index
#   - db-data: Persistent volume for SQLite database
#   - mosquitto-data: Persistent volume for MQTT message store
#
# USAGE:
#   Development: docker compose up --build
#   Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================
