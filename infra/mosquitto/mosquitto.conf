# =============================================================================
# AyushBot Infrastructure — Mosquitto MQTT Broker Configuration
# =============================================================================
#
# PURPOSE:
#   Configuration for the Eclipse Mosquitto MQTT broker running on the
#   PHC gateway (Raspberry Pi 4). This broker receives sensor data from
#   the Android phone's BLE-to-MQTT bridge and delivers it to the backend.
#
# LISTENERS:
#
#   Listener 1: Secure MQTT (port 8883)
#     - Protocol: MQTT over TLS 1.3
#     - Client authentication: mTLS (client certificate required)
#     - Used by: Android phone → Broker (sensor data publish)
#                Backend → Broker (sensor data subscribe)
#     - TLS config:
#       cafile: /mosquitto/certs/ca.crt
#       certfile: /mosquitto/certs/server.crt
#       keyfile: /mosquitto/certs/server.key
#       require_certificate: true
#       tls_version: tlsv1.3
#
#   Listener 2: Local-only plain MQTT (port 1883) — Development Only
#     - Bind address: 127.0.0.1 (loopback only — not exposed externally)
#     - Used for: Docker inter-container communication (internal network)
#     - DISABLE in production (use TLS-only via docker-compose.prod.yml)
#
# AUTHENTICATION:
#   - password_file: /mosquitto/config/passwd (hashed passwords)
#   - acl_file: /mosquitto/config/acl.conf (topic-level authorization)
#   - allow_anonymous: false
#
# PERSISTENCE:
#   - persistence: true
#   - persistence_location: /mosquitto/data/
#   - Retained messages stored on disk (survives broker restart)
#   - Max queued messages: 1000 (prevent memory exhaustion on RPi 4)
#
# LOGGING:
#   - log_dest: file /mosquitto/log/mosquitto.log
#   - log_type: error warning notice (no debug in production)
#   - connection_messages: true (log connect/disconnect events)
#
# MESSAGE LIMITS:
#   - max_inflight_messages: 20
#   - max_queued_messages: 1000
#   - message_size_limit: 4096 (sensor payloads are small, ~200 bytes)
# =============================================================================
