# Certificate common names become MQTT usernames through
# use_identity_as_username. Deny-by-default applies to every unmatched topic.

# Backend certificate CN: backend_gateway
user backend_gateway
topic read ayushbot/tablets/+/sensors/#
topic read ayushbot/devices/+/status
topic write ayushbot/triage/+/result
topic readwrite ayushbot/system/health

# Tablet certificate CN should equal its provisioned device ID. Each tablet
# can publish only below its own namespace and read its own result namespace.
pattern write ayushbot/tablets/%u/sensors/#
pattern write ayushbot/devices/%u/status
pattern read ayushbot/tablets/%u/triage/#
