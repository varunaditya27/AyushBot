# =============================================================================
# AyushBot Infrastructure — Mosquitto MQTT Access Control List
# =============================================================================
#
# PURPOSE:
#   Defines topic-level access control for the MQTT broker. Each connected
#   client is authorized to publish/subscribe only to specific topics based
#   on their role. This prevents unauthorized data access.
#
# TOPIC HIERARCHY:
#   ayushbot/
#   ├── sensors/<device_id>/vitals    → Sensor vital sign data
#   ├── sensors/<device_id>/status    → Sensor battery + connectivity status
#   ├── triage/<session_id>/result    → Triage outcome for a session
#   ├── fl/gradients/<node_id>        → FL gradient uploads
#   ├── fl/global_model               → FL global model broadcasts
#   └── system/health                 → Gateway system health metrics
#
# ROLES & PERMISSIONS:
#
#   User: android_bridge
#   Description: The Android phone app that bridges BLE sensor data to MQTT
#   Permissions:
#     - PUBLISH to ayushbot/sensors/+/vitals (send sensor readings)
#     - PUBLISH to ayushbot/sensors/+/status (send device status)
#     - SUBSCRIBE to ayushbot/triage/+/result (receive triage outcomes)
#
#   User: backend_gateway
#   Description: The FastAPI backend running the agent system
#   Permissions:
#     - SUBSCRIBE to ayushbot/sensors/# (receive all sensor data)
#     - PUBLISH to ayushbot/triage/+/result (send triage results)
#     - PUBLISH to ayushbot/fl/gradients/+ (upload FL gradients)
#     - SUBSCRIBE to ayushbot/fl/global_model (receive FL model updates)
#     - PUBLISH/SUBSCRIBE to ayushbot/system/health
#
#   User: fl_server (cloud)
#   Description: Cloud FL server (when connectivity available)
#   Permissions:
#     - SUBSCRIBE to ayushbot/fl/gradients/# (receive gradient uploads)
#     - PUBLISH to ayushbot/fl/global_model (broadcast updated model)
#
# SECURITY:
#   - Default policy: deny all (no access unless explicitly granted)
#   - Wildcard topics (+, #) are restricted to specific roles
#   - Each Android device has a unique client ID for auditability
# =============================================================================
