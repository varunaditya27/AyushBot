# Copy to backend/config.yaml and adjust paths for the deployment environment.
# Paths are resolved relative to the repository root unless absolute.
#
# Supported modes:
# - development: local defaults; optional services disabled; no certs or JWT keys required.
# - test: temporary databases and deterministic fixtures; no production certs required.
# - production: startup validation requires explicit CORS origins, readable TLS files,
#   readable ES256 JWT key files, MQTT TLS, and medically reviewed reference files.
environment: development

api:
  host: 127.0.0.1
  port: 8000
  cors_origins: [http://localhost, http://127.0.0.1]
  rate_limit_max_tokens: 20
  rate_limit_refill_rate: 5.0
  tls_cert_path: null
  tls_key_path: null

database:
  path: var/ayushbot.db
  wal_mode: true
  journal_size_limit_mb: 50

redis:
  enabled: false
  url: redis://127.0.0.1:6379/0

mqtt:
  enabled: false
  host: 127.0.0.1
  port: 1883
  topic: ayushbot/telemetry/#
  username: null
  password: null
  tls_enabled: false
  ca_cert_path: null
  client_cert_path: null
  client_key_path: null

triage_model:
  enabled: true
  path: models/triage_xgb.json
  metadata_path: models/triage_xgb.metadata.json
  # Production must point to medically reviewed files that exist.
  # The example files are templates only and must not be used for production.
  rules_path: data/reference/pretriage_rules.example.json
  growth_reference_path: data/reference/who_weight_for_age_lms.example.json
  # Development/test may use draft/template references for a showcase.
  # Production must set allow_draft_rules=false and require_reviewed_rules=true.
  allow_draft_rules: true
  require_reviewed_rules: false

rag:
  enabled: false
  corpus_dir: data/corpus/cleaned_text
  index_dir: backend/rag/index
  model_dir: models/rag/biencoder
  embedding_model_id: local-onnx-biencoder
  chunk_size: 300
  chunk_overlap: 50
  dense_top_k: 100
  sparse_top_k: 100
  retriever_top_k_fused: 20
  reranker_min_score: 0.3
  rrf_k: 60
  faiss_use_hnsw: true
  faiss_hnsw_m: 32
  faiss_ef_construction: 200
  faiss_ef_search: 128
  max_length: 256
  intra_op_threads: 1
  inter_op_threads: 1

referral:
  max_search_radius_km: 50.0
  allow_out_of_radius_for_emergency: true

language:
  provider: noop
  enabled_languages: [en, hi]
  default_language: en
  require_human_review_below_confidence: 0.9

llm:
  model_path: models/llm/model.gguf
  context_length: 2048
  max_tokens: 300
  temperature: 0.1
  top_p: 0.9
  n_threads: 2
  n_gpu_layers: 0

fl:
  enabled: false
  training_enabled: false
  update_representation: not_implemented
  server_address: 127.0.0.1:8080
  model_path: models/triage_xgb.json
  train_data_path: var/fl_train.npz
  eval_data_path: var/fl_eval.npz
  queue_dir: var/fl_queue
  local_epochs: 3
  learning_rate: 0.01
  min_batch_size: 10
  dp_epsilon: 1.0
  dp_delta: 1.0e-6
  dp_max_grad_norm: 1.0

auth:
  issuer: ayushbot-phc-gateway
  audience: ayushbot-tablet
  access_token_minutes: 15
  refresh_token_days: 7
  active_kid: gateway-1
  keys: []
  # Production example; generate these outside the repository and install them
  # with restricted permissions before switching environment to production.
  # active_kid: gateway-2026-01
  # keys:
  #   - kid: gateway-2026-01
  #     public_key_path: infra/certs/jwt_gateway_2026_01_public.pem
  #     private_key_path: infra/certs/jwt_gateway_2026_01_private.pem
  #     active: true
  jwt_private_key_path: null
  jwt_public_key_path: null

sync:
  resource_dir: var/sync_resources
  idempotency_ttl_hours: 72
  manifest_ttl_minutes: 15

road_graph_path: null
